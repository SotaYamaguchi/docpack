version: 2

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # デフォルトで有効なもの（明示的に記載）
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # 追加で有効にするもの
    - misspell
    - gocyclo
    - revive

linters-settings:
  gocyclo:
    min-complexity: 15
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
